# Grove ↔ Matrix Application Service registration
# Copy this file to your Synapse config directory, then add to homeserver.yaml:
#
#   app_service_config_files:
#     - /path/to/grove_bridge_registration.yaml
#
# Generate fresh tokens with: python3 -c "import secrets; print(secrets.token_hex(32))"

id: grove-bridge
url: "http://localhost:8560"       # where Synapse POSTs events (your bridge's AS port)

as_token: "REPLACE_WITH_AS_TOKEN"  # = GROVE_AS_TOKEN in your env file
hs_token: "REPLACE_WITH_HS_TOKEN"  # = GROVE_HS_TOKEN in your env file

sender_localpart: grove_bridge     # the bridge bot's Matrix localpart

namespaces:
  users:
    - exclusive: true
      regex: '@grove_.*'           # bridge owns all @grove_* virtual users
  rooms:  []
  aliases: []

rate_limited: false
